apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-ecg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-ecg
  template:
    metadata:
      labels:
        app: ai-ecg
    spec:
      containers:
        - name: ai-ecg
          image: "{{ .Values.aiEcg.image.repository }}/{{ .Values.aiEcg.image.name }}:{{ .Values.aiEcg.image.tag }}"
          imagePullPolicy: {{ .Values.aiEcg.image.pullPolicy }}
          securityContext:
            privileged: true
          envFrom:
            - configMapRef:
                name: device-config
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: models
              mountPath: /models
            - name: videos
              mountPath: /videos
            - name: dri
              mountPath: /dev/dri
            - name: dev
              mountPath: /dev
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: models-pvc
        - name: videos
          persistentVolumeClaim:
            claimName: videos-pvc
        - name: dri
          hostPath:
            path: /dev/dri
        - name: dev
          hostPath:
            path: /dev