{{- $serviceType := .Values.service.type | default "ClusterIP" }}

apiVersion: v1
kind: Service
metadata:
  name: aggregator
spec:
  type: {{ $serviceType }}
  selector:
    app: aggregator
  ports:
    - name: http
      port: 80           # Expose standard HTTP port for ingress
      targetPort: 8001   # Container port remains 8001
      protocol: TCP
    - name: grpc
      port: 50051
      targetPort: 50051
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: ai-ecg
spec:
  type: {{ $serviceType }}
  selector:
    app: ai-ecg
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: rppg
spec:
  type: {{ $serviceType }}
  selector:
    app: rppg
  ports:
    - name: http
      port: 8084
      targetPort: 8084
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: pose
spec:
  type: {{ $serviceType }}
  selector:
    app: pose
  ports:
    - name: http
      port: 8083
      targetPort: 8083
      protocol: TCP
    - name: video
      port: 8085
      targetPort: 8085
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: metrics
spec:
  type: {{ $serviceType }}
  selector:
    app: metrics
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: dds-bridge
spec:
  type: {{ $serviceType }}
  selector:
    app: dds-bridge
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: mdpnp
spec:
  type: {{ $serviceType }}
  selector:
    app: mdpnp
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP

---
apiVersion: v1
kind: Service
metadata:
  name: ui
spec:
  type: {{ $serviceType }}
  selector:
    app: ui
  ports:
    - name: http
      port: 80           # UI is exposed on 80 for ingress
      targetPort: 3000   # Container port remains 3000
      protocol: TCP