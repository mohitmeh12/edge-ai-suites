apiVersion: apps/v1
kind: Deployment
metadata:
  name: ui
spec:
  replicas: 1

  selector:
    matchLabels:
      app: ui

  template:
    metadata:
      labels:
        app: ui

    spec:
      initContainers:
        - name: patch-ui-pose-stream-url
          image: "{{ .Values.ui.image.repository }}/{{ .Values.ui.image.name }}:{{ .Values.ui.image.tag }}"
          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -e
              mkdir -p /work
              cp -a /usr/share/nginx/html/. /work/
              {{- if .Values.ingress.enabled }}
              # With ingress: use relative path (ingress routes /video_feed to pose service)
              find /work/assets -type f -name "*.js" -print0 | xargs -0 sed -i 's|:8085/video_feed|/video_feed|g'
              echo "UI bundle patched for ingress-based pose stream path"
              {{- else }}
              # Without ingress: use absolute path with port (for port-forward access)
              # This allows kubectl port-forward svc/ui 8080:80 and svc/pose 8085:8085 to work together
              find /work/assets -type f -name "*.js" -print0 | xargs -0 sed -i 's|:8085/video_feed|:8085/video_feed|g'
              echo "UI bundle patched for port-forward-based pose stream path"
              {{- end }}
          volumeMounts:
            - name: ui-www
              mountPath: /work
      containers:
        - name: ui

          image: "{{ .Values.ui.image.repository }}/{{ .Values.ui.image.name }}:{{ .Values.ui.image.tag }}"

          imagePullPolicy: {{ .Values.ui.image.pullPolicy }}

          ports:
            - containerPort: 3000

          volumeMounts:
            - name: ui-www
              mountPath: /usr/share/nginx/html

          env:
            {{- if .Values.ingress.enabled }}
            # With ingress: all services routed through ingress controller
            - name: VITE_API_BASE_URL
              value: "/api"
            - name: VITE_POSE_STREAM_URL
              value: "/video_feed"
            {{- else }}
            # Without ingress (port-forward mode): services accessible via localhost with different ports
            - name: VITE_API_BASE_URL
              value: "http://localhost:8001"
            - name: VITE_POSE_STREAM_URL
              value: "http://localhost:8085/video_feed"
            {{- end }}

      volumes:
        - name: ui-www
          emptyDir: {}
