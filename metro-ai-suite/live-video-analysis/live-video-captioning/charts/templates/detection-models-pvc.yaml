{{/*
Copyright (C) 2026 Intel Corporation
SPDX-License-Identifier: Apache-2.0

PVC for OpenVINO object detection models (ov_detection_models/).
Mounted read-only by dlstreamer-pipeline-server and video-caption-service.

When detectionModelsPvc.keepPvc is true (default):
  - No hook — Helm manages the PVC as a regular resource on every install and
    upgrade, automatically creating it if it does not exist.
  - helm.sh/resource-policy: keep — Helm skips the PVC on uninstall.
  - Models survive helm upgrade and helm uninstall.

When detectionModelsPvc.keepPvc is false:
  - helm.sh/hook: pre-install,pre-upgrade — Helm processes the PVC on every run.
  - hook-delete-policy: before-hook-creation — the PVC (and its data) is deleted
    and recreated on every upgrade, triggering a fresh model download.
*/}}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "live-video-captioning.fullname" . }}-detection-models
  labels:
    {{- include "live-video-captioning.labels" . | nindent 4 }}
    app.kubernetes.io/component: storage
  annotations:
    {{- if .Values.detectionModelsPvc.keepPvc }}
    "helm.sh/resource-policy": keep
    {{- else }}
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-15"
    "helm.sh/hook-delete-policy": before-hook-creation
    {{- end }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.global.storageClassName }}
  storageClassName: {{ .Values.global.storageClassName | quote }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.detectionModelsPvc.size | quote }}
