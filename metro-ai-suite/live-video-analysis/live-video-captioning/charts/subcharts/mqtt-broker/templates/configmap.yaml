apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "mqtt-broker.fullname" . }}-config
  labels:
    {{- include "mqtt-broker.labels" . | nindent 4 }}
data:
  mosquitto.conf: |
    allow_anonymous {{ .Values.config.allowAnonymous }}
    listener {{ .Values.config.listener }}
