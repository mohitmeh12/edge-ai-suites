apiVersion: v1
kind: Service
metadata:
  name: {{ include "mqtt-broker.fullname" . }}
  labels:
    {{- include "mqtt-broker.labels" . | nindent 4 }}
    app.kubernetes.io/component: mqtt-broker
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "mqtt-broker.selectorLabels" . | nindent 4 }}
  ports:
    - name: mqtt
      port: {{ .Values.service.port }}
      targetPort: mqtt
      protocol: TCP
