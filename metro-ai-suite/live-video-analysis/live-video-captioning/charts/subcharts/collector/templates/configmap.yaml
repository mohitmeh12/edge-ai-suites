{{/*
Copyright (C) 2026 Intel Corporation
SPDX-License-Identifier: Apache-2.0

ConfigMap holding the telegraf.conf for the collector.
The WEBSOCKET_URL environment variable in the DaemonSet is substituted
by Telegraf at runtime via ${WEBSOCKET_URL}.
*/}}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "collector.fullname" . }}-telegraf-config
  labels:
    {{- include "collector.labels" . | nindent 4 }}
data:
  telegraf.conf: |
    # Configuration for telegraf agent
    # Customized for Metrics Service - Standalone deployment
    [agent]
      interval = "2s"
      round_interval = true
      metric_batch_size = 2000
      metric_buffer_limit = 20000
      collection_jitter = "0s"
      flush_interval = "1s"
      flush_jitter = "0s"
      precision = "0s"

    [[inputs.cpu]]
      percpu = false
      totalcpu = true
      collect_cpu_time = false
      report_active = false
      core_tags = false

    [[inputs.mem]]

    [[inputs.exec]]
      # read_cpu_freq.sh is bundled inside the collector image at /app/read_cpu_freq.sh.
      commands = ["/app/read_cpu_freq.sh"]
      environment = []
      name_suffix = ""
      timeout = "15s"
      data_format = "influx"
      interval = "10s"

    [[inputs.execd]]
      # qmassa_reader.py is bundled inside the collector image at /app/qmassa_reader.py.
      command = ["python3", "/app/qmassa_reader.py"]
      data_format = "influx"

    [[inputs.temp]]

    [[processors.starlark]]
      namepass = ["temp"]
      source = '''
    def apply(metric):
        return metric if metric.tags.get("sensor", "").startswith("coretemp_package_id_") else None
    '''

    [[inputs.file]]
      files = ["/app/.collector-signals/fps.txt"]
      data_format = "value"
      data_type = "float"
      name_override = "fps"

    [[outputs.prometheus_client]]
      listen = ":9273"
      metric_version = 1
      path = "/metrics"
      collectors_exclude = ["gocollector", "process"]
      string_as_label = true
      export_timestamp = true

    [[outputs.websocket]]
      url = "${WEBSOCKET_URL}"
      data_format = "json"
      read_timeout = "0s"
