{{/*
coturn uses hostPort binding (UDP 3478) — only one pod can bind a given host port
per node.  Ensure replicaCount is always 1.
*/}}
{{- if gt (int .Values.replicaCount) 1 }}
{{- fail "coturn replicaCount must be 1: multiple replicas conflict on the host UDP port." }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "coturn.fullname" . }}
  labels:
    {{- include "coturn.labels" . | nindent 4 }}
    app.kubernetes.io/component: coturn
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: Recreate
    rollingUpdate: null
  selector:
    matchLabels:
      {{- include "coturn.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "coturn.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: coturn
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      {{- include "lvc.imagePullSecrets" . | nindent 6 }}
      {{- include "lvc.nodeAffinity" . | nindent 6 }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: coturn
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.extraArgs }}
          args:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          ports:
            - name: turn-udp
              containerPort: {{ .Values.service.port }}
              hostPort: {{ .Values.service.nodePort }}
              protocol: UDP
          env:
            {{- include "lvc.proxyEnv" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
