apiVersion: v1
kind: Service
metadata:
  name: {{ include "live-metrics-service.fullname" . }}
  labels:
    {{- include "live-metrics-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: live-metrics-service
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "live-metrics-service.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.service.port }}
      targetPort: metrics
      protocol: TCP
      {{- if eq .Values.service.type "NodePort" }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
